name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  IMAGE_NAME: resumeai-app
  REGISTRY: ghcr.io

jobs:
  # ── Job 1: Lint & Test ────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Debug Environment
        run: |
          echo "📂 Project Structure:"
          ls -R
          echo "🟢 Node Version:"
          node -v
          echo "📦 NPM Version:"
          npm -v
          echo "🛡️ Check Environment Variables (names only):"
          env | grep -E 'NODE_ENV|PORT|MONGODB_URI' || true

      - name: Check for syntax errors
        run: node --check server.js

      - name: Verify server starts
        env:
          MONGODB_URI: mongodb://localhost:27017/resume_screener_test
          SECRET_KEY: test_secret_key_for_ci_pipeline_only
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          PORT: 8001
          NODE_ENV: test
        run: |
          echo "🚀 Starting server test on port 8001..."
          timeout 15 node server.js > server.log 2>&1 &
          
          echo "⏳ Waiting for server to stabilize..."
          for i in {1..5}; do
            if curl -s http://localhost:8001/hr/login > /dev/null; then
              echo "✅ Server is up and responding!"
              exit 0
            fi
            echo "Waiting... ($i/5)"
            sleep 3
          done

          echo "❌ Server failed to respond in time. Last 20 lines of logs:"
          tail -n 20 server.log
          exit 1

  # ── Job 2: Build & Push Docker Image ─────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy ─────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    environment: production

    steps:
      - name: Trigger Render Deploy
        if: success()
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
