<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply - ResumeAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#6366F1">
</head>
<body class="apply-page fade-in">
    <header class="apply-topbar" style="background: rgba(9, 9, 11, 0.8); border-bottom: 1px solid var(--border-subtle);">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="logo-icon" style="width: 32px; height: 32px; background: var(--gradient-main);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <span style="font-size: 20px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary);">ResumeAI</span>
        </div>
        <div class="badge badge-blue desktop-only" style="font-weight: 600;">✦ AI-Enhanced Recruitment</div>
    </header>

    <main class="apply-card glass-card slide-up" style="max-width: 680px; margin-top: 100px; padding: 48px 24px;">
        <div style="text-align: center; margin-bottom: 40px;">
            <p style="font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--accent-blue-lt); letter-spacing: 0.15em; margin-bottom: 12px;">Immediate Opening</p>
            <h1 class="apply-job-title" style="font-size: 28px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 16px;">{{jobTitle}}</h1>
            <div style="width: 48px; height: 4px; background: var(--gradient-main); border-radius: 2px; margin: 0 auto;"></div>
        </div>

        <section class="apply-job-desc" id="job-desc-text" style="font-size: 14px; color: var(--text-secondary); line-height: 1.8; margin-bottom: 24px; max-height: 100px; overflow: hidden; transition: max-height 0.5s ease;">
            {{jobDescription}}
        </section>
        <button class="btn btn-ghost" style="margin: 0 auto 32px; display: block; height: 32px; font-size: 12px;" id="toggle-desc-btn">View position details ↓</button>

        <form id="apply-form" style="display: flex; flex-direction: column; gap: 32px;">
            <div>
                <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 16px;">Personal Information</p>
                <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <div class="form-group">
                       <label class="form-label">Full Name</label>
                       <input type="text" name="name" class="form-input" id="applicant-name" placeholder="Alex Rivera" required>
                    </div>
                    <div class="form-group">
                       <label class="form-label">Email Address</label>
                       <input type="email" name="email" class="form-input" id="applicant-email" placeholder="alex@example.com" required>
                    </div>
                </div>
                <div class="stats-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                       <label class="form-label">Phone Number</label>
                       <input type="tel" name="phone" class="form-input" id="applicant-phone" placeholder="+1 (555) 000-0000" required>
                    </div>
                    <div class="form-group">
                       <label class="form-label">LinkedIn URL</label>
                       <input type="url" name="linkedin" class="form-input" id="applicant-linkedin" placeholder="linkedin.com/in/alexrivera">
                    </div>
                </div>
            </div>

            <div>
                <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px;">Resume Artifact</p>
                <div class="upload-zone" id="upload-zone" style="border: 2px dashed var(--border-subtle); border-radius: var(--radius-lg); padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s ease;">
                    <input type="file" name="resume" id="resume-input" accept=".pdf" style="display: none;">
                    <div class="upload-prompt" id="upload-prompt">
                        <div style="margin-bottom: 16px; color: var(--text-muted);">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <p style="font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px;">Upload your PDF resume</p>
                        <p style="font-size: 12px; color: var(--text-muted);">Select or drag and drop (Max 10MB)</p>
                    </div>
                    <div class="file-info" id="file-info" style="display: none; align-items: center; gap: 16px; padding: 16px; background: rgba(255,255,255,0.03); border-radius: var(--radius-md);">
                       <div style="width: 40px; height: 40px; border-radius: 8px; background: var(--accent-red); opacity: 0.8; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; color: white;">PDF</div>
                       <div style="flex: 1; text-align: left; overflow: hidden;">
                           <p id="display-filename" style="font-size: 14px; font-weight: 600; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
                           <p id="display-filesize" style="font-size: 11px; color: var(--text-muted);"></p>
                       </div>
                       <button type="button" id="remove-file-btn" style="background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 8px; font-size: 18px;">✕</button>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="submit-btn" style="width: 100%; height: 56px; font-size: 15px; font-weight: 700; letter-spacing: 0.02em;" disabled>Submit Application</button>
        </form>

        <div style="display: flex; justify-content: center; gap: 24px; margin-top: 40px; opacity: 0.5;">
            <div style="display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                Secure
            </div>
            <div style="display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted);">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Private
            </div>
        </div>
    </main>

    <footer style="margin: 48px 0; color: var(--text-muted); font-size: 11px; font-weight: 500; text-align: center; text-transform: uppercase; letter-spacing: 0.2em; opacity: 0.6;">
        © 2026 ResumeAI · Next Generation Talent Matching
    </footer>

    <script src="/static/app.js"></script>
    <script>
        const form = document.getElementById('apply-form');
        const uploadZone = document.getElementById('upload-zone');
        const resumeInput = document.getElementById('resume-input');
        const submitBtn = document.getElementById('submit-btn');
        let selectedFile = null;

        // Validation
        const validate = () => {
            const name = document.getElementById('applicant-name').value.trim();
            const email = document.getElementById('applicant-email').value.trim();
            const phone = document.getElementById('applicant-phone').value.trim();
            submitBtn.disabled = !(name && email && phone && selectedFile);
        };

        ['input', 'change'].forEach(ev => form.addEventListener(ev, validate));

        // Upload Zone Logic
        uploadZone.onclick = (e) => {
            if (e.target.id !== 'remove-file-btn') resumeInput.click();
        };

        resumeInput.onchange = (e) => handleFile(e.target.files[0]);

        uploadZone.ondragover = (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        };

        uploadZone.ondragleave = () => uploadZone.classList.remove('dragover');

        uploadZone.ondrop = (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };

        const uploadPrompt = document.getElementById('upload-prompt');
        const fileInfo = document.getElementById('file-info');

        function handleFile(file) {
            if (!file || !file.name.endsWith('.pdf')) {
                showToast('Please upload a PDF document.', 'error');
                return;
            }
            if (file.size > 10 * 1024 * 1024) {
                showToast('File size must be under 10MB.', 'error');
                return;
            }
            selectedFile = file;
            uploadPrompt.style.display = 'none';
            fileInfo.style.display = 'flex';
            document.getElementById('display-filename').textContent = file.name;
            document.getElementById('display-filesize').textContent = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            validate();
        }

        document.getElementById('remove-file-btn').onclick = (e) => {
            e.stopPropagation();
            selectedFile = null;
            resumeInput.value = '';
            uploadPrompt.style.display = 'block';
            fileInfo.style.display = 'none';
            validate();
        };

        // UI Helpers
        const toggleBtn = document.getElementById('toggle-desc-btn');
        const descText = document.getElementById('job-desc-text');
        toggleBtn.onclick = () => {
             if (descText.style.maxHeight === 'none') {
                 descText.style.maxHeight = '120px';
                 toggleBtn.textContent = 'View position details ↓';
             } else {
                 descText.style.maxHeight = 'none';
                 toggleBtn.textContent = 'Hide details ↑';
             }
        };

        form.onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(form);
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Submitting Your Application...';
            
            try {
                const res = await fetch('/api/apply/{{jobId}}', {
                    method: 'POST',
                    body: formData
                });
                if (res.redirected) {
                    window.location.href = res.url;
                } else {
                    const data = await res.json();
                    showToast(data.error || 'Submission failed', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Submit Application →';
                }
            } catch (err) {
                showToast('Network error. Please try again.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Submit Application →';
            }
        };
    </script>
</body>
</html>
