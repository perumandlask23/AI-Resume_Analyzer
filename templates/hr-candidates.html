<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Candidates - ResumeAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="dashboard-layout fade-in">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div>
            <span class="logo-text">ResumeAI</span>
            <span style="font-size: 10px; color: var(--text-muted); margin-left: auto;">v2.5</span>
        </div>

        <div style="padding: 0 16px; margin-bottom: 32px;">
            <div class="glass-card" style="padding: 16px; display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,0.02);">
                <div class="user-avatar" id="sidebar-avatar">JD</div>
                <div style="overflow: hidden;">
                    <p style="font-size: 14px; font-weight: 700; color: var(--text-primary); margin: 0;">{{user_name}}</p>
                    <p style="font-size: 11px; color: var(--text-muted); margin: 0;">HR Administrator</p>
                </div>
            </div>
        </div>

        <nav class="nav-section">
            <p style="padding-left: 24px; font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px;">Main Menu</p>
            <a href="/hr/dashboard" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Dashboard
            </a>
            <a href="/hr/candidates" class="nav-item active">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Candidates
            </a>
            <a href="/hr/analytics" class="nav-item">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
                Analytics
                <span class="badge badge-blue" style="margin-left: auto; font-size: 9px; padding: 2px 6px;">BETA</span>
            </a>
        </nav>

        <div style="margin-top: auto; padding: 24px;">
            <form action="/api/hr/logout" method="POST">
                <button type="submit" class="btn btn-ghost" style="width: 100%; height: 40px; justify-content: flex-start; gap: 12px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Logout
                </button>
            </form>
        </div>
    </aside>

    <main class="main-content">
        <header style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 48px;">
            <div>
                <h1 style="font-size: 32px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px;">All Candidates</h1>
                <p style="font-size: 14px; color: var(--text-secondary);">ResumeAI / <span style="color: var(--text-primary);">Candidates</span></p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <select id="filter-status" class="form-input" style="width: 160px; height: 44px; font-size: 13px;">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="under_review">Under Review</option>
                    <option value="shortlisted">Shortlisted</option>
                    <option value="rejected">Rejected</option>
                </select>
                <select id="filter-job" class="form-input" style="width: 200px; height: 44px; font-size: 13px;">
                    <option value="">All Positions</option>
                </select>
            </div>
        </header>

        <!-- Stats Summary -->
        <section style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px;" id="stats-row">
            <div class="glass-card slide-up" style="padding: 20px;">
                <p style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;">Total</p>
                <p id="stat-total" style="font-size: 28px; font-weight: 800;">—</p>
            </div>
            <div class="glass-card slide-up" style="padding: 20px;">
                <p style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;">Shortlisted</p>
                <p id="stat-shortlisted" style="font-size: 28px; font-weight: 800; color: var(--accent-green);">—</p>
            </div>
            <div class="glass-card slide-up" style="padding: 20px;">
                <p style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;">AI Analyzed</p>
                <p id="stat-analyzed" style="font-size: 28px; font-weight: 800; color: var(--accent-blue-lt);">—</p>
            </div>
            <div class="glass-card slide-up" style="padding: 20px;">
                <p style="font-size: 11px; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px;">Avg Match</p>
                <p id="stat-avg" style="font-size: 28px; font-weight: 800; color: var(--accent-purple-lt);">—</p>
            </div>
        </section>

        <div class="glass-card slide-up" style="overflow: hidden;">
            <div style="padding: 24px 32px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center;">
                <h2 style="font-size: 16px; font-weight: 700;">Candidate Pool</h2>
                <input type="text" id="search-input" class="form-input" style="width: 240px; height: 40px; font-size: 13px;" placeholder="Search name or email...">
            </div>
            <div style="overflow-x: auto; padding: 0 16px;">
                <table class="premium-table">
                    <thead>
                        <tr>
                            <th>Candidate</th>
                            <th>Position</th>
                            <th>Applied</th>
                            <th>Match Score</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="candidates-tbody">
                        <tr><td colspan="6" style="text-align:center; padding: 60px; color: var(--text-muted);">
                            <span class="shimmer" style="padding: 8px 16px; border-radius: 8px;">Loading candidates...</span>
                        </td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="/static/app.js" defer></script>
    <script>
        const name = "{{user_name}}";
        const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
        document.getElementById('sidebar-avatar').textContent = initials;

        let allCandidates = [];
        let allJobs = [];

        async function loadAll() {
            try {
                // Load all jobs first
                allJobs = await apiCall('/api/jobs');
                const jobFilter = document.getElementById('filter-job');
                allJobs.forEach(j => {
                    const opt = document.createElement('option');
                    opt.value = j.id;
                    opt.textContent = j.title;
                    jobFilter.appendChild(opt);
                });

                // Load candidates for all jobs in parallel
                const results = await Promise.all(allJobs.map(j =>
                    apiCall(`/api/jobs/${j.id}/applicants`).then(apps =>
                        apps.map(a => ({ ...a, jobTitle: j.title, jobId: j.id }))
                    ).catch(() => [])
                ));
                allCandidates = results.flat().sort((a, b) => new Date(b.submittedAt) - new Date(a.submittedAt));

                updateStats(allCandidates);
                renderTable(allCandidates);
            } catch(e) {
                document.getElementById('candidates-tbody').innerHTML =
                    '<tr><td colspan="6" style="text-align:center; padding:40px; color:var(--text-muted);">Failed to load candidates.</td></tr>';
            }
        }

        function updateStats(data) {
            const analyzed = data.filter(c => c.analysis && c.analysis.match_score !== undefined);
            const avgScore = analyzed.length
                ? Math.round(analyzed.reduce((s, c) => s + c.analysis.match_score, 0) / analyzed.length)
                : 0;
            document.getElementById('stat-total').textContent = data.length;
            document.getElementById('stat-shortlisted').textContent = data.filter(c => c.status === 'shortlisted').length;
            document.getElementById('stat-analyzed').textContent = analyzed.length;
            document.getElementById('stat-avg').textContent = analyzed.length ? avgScore + '%' : '—';
        }

        function renderTable(data) {
            const tbody = document.getElementById('candidates-tbody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:60px; color:var(--text-muted);">No candidates match your filters.</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            data.forEach(c => {
                const score = c.analysis?.match_score;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>
                        <div style="display:flex; align-items:center; gap:14px;">
                            <div class="user-avatar" style="width:36px; height:36px; font-size:12px; border:1px solid var(--border-subtle); background: var(--bg-elevated);">${c.name.split(' ').map(n => n[0]).join('')}</div>
                            <div>
                                <p style="font-weight:700; color:var(--text-primary); margin-bottom:2px;">${c.name}</p>
                                <p style="font-size:12px; color:var(--text-muted);">${c.email}</p>
                            </div>
                        </div>
                    </td>
                    <td><a href="/hr/jobs/${c.jobId}" style="color:var(--accent-blue-lt); font-size:13px; font-weight:600; text-decoration:none;">${c.jobTitle}</a></td>
                    <td style="color:var(--text-secondary); font-size:13px;">${new Date(c.submittedAt).toLocaleDateString()}</td>
                    <td>${score !== undefined ? `<div class="badge ${score >= 70 ? 'badge-green' : score >= 40 ? 'badge-amber' : 'badge-red'}">${score}%</div>` : '<span style="color:var(--text-muted); font-size:13px;">—</span>'}</td>
                    <td><span class="badge ${c.status === 'shortlisted' ? 'badge-green' : c.status === 'under_review' ? 'badge-blue' : c.status === 'rejected' ? 'badge-red' : 'badge-amber'}">${c.status.replace('_', ' ')}</span></td>
                    <td><a href="/hr/jobs/${c.jobId}" class="btn btn-ghost" style="height:36px; font-size:12px; text-decoration:none;">View Pipeline</a></td>
                `;
                tbody.appendChild(tr);
            });
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const status = document.getElementById('filter-status').value;
            const jobId = document.getElementById('filter-job').value;
            const filtered = allCandidates.filter(c => {
                const matchSearch = !search || c.name.toLowerCase().includes(search) || c.email.toLowerCase().includes(search);
                const matchStatus = !status || c.status === status;
                const matchJob = !jobId || c.jobId === jobId;
                return matchSearch && matchStatus && matchJob;
            });
            updateStats(filtered);
            renderTable(filtered);
        }

        document.getElementById('search-input').addEventListener('input', applyFilters);
        document.getElementById('filter-status').addEventListener('change', applyFilters);
        document.getElementById('filter-job').addEventListener('change', applyFilters);

        window.onload = loadAll;
    </script>
</body>
</html>
